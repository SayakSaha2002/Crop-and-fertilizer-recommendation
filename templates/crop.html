<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style_crop.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style_navigation.css') }}">
</head>
<body>

        <!-- Navigation menu with links to different pages (Home, About, Crop Prediction, Fertilizer Prediction) -->
        <ul>
            <li><a href="/aboutPage">About Us</a></li>
            <li><a class="active" href="/ferti">Fertilizer Prediction</a></li>
            <li><a class="active" href="/crop">Crop Prediction</a></li>
            <li><a class="active" href="/">Home</a></li>
        </ul>


    <header>
        <div class="marquee">
      <marquee>  <h1>Crop Prediction System</h1> </marquee></div>
    </header>
    <!-- <a href="/" class="back-to-home">Back to Home</a> -->
    <main>
        

        <form id="cropForm" action="/crop" method="POST">
            <div class="soil">
                <b> <label for="soil_color">Soil-Colour:</label></b>
                <select id="soil_color" name="soil_color" required>
                    <option value="">Select Soil Color</option>
                    <option value="Black">Black</option>
                    <option value="Red">Red</option>
                    <option value="Medium Brown">Medium Brown</option>
                    <option value="Dark Brown">Dark Brown</option>
                    <option value="Light Brown">Light Brown</option>
                    <option value="Reddish Brown">Reddish Brown</option>
                </select>
            </div>
       

           <b> <label for="n">Nitrogen (N):</label></b>
            <input type="number" id="n" name="n" required>
            
            <b><label for="p" >Phosphorus (P):</label></b>
            <input type="number" id="p" name="p" required>
            
            <b> <label for="k">Potassium (K):</label> </b>
            <input type="number" id="k" name="k" required>
            
           <b> <label for="ph">pH Level:</label> </b>
            <input type="number" step="0.01" id="ph" name="ph" required>
            
           <b> <label for="rainfall">Rainfall (mm):</label> </b>
            <input type="number" step="0.01" id="rainfall" name="rainfall" required>
            
           <b> <label for="temperature">Temperature (°C):</label> </b>
            <input type="number" step="0.01" id="temperature" name="temperature" required>
            
           <b> <label><button type="submit">Predict Crop</button></label></b>
        </form>

<!-- Popup for displaying predicted crop -->
<div id="overlay"></div>
<div class="popup" id="popupMessage">
    <button class="close-btn" onclick="closePopup()">×</button>
    <p id="popupText"></p>
    <img id="popupImage" src="" alt="Crop Image" style="display: none; max-width: 100%; margin-top: 20px;">
</div>



</main>

    <!-- Link to external JavaScript -->
    <script src="{{ url_for('static', filename='javascript/script_crop.js') }}"></script>

</body>
</html>
